exclude: '^reference/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: ruff
        name: ruff (format + check --fix)
        entry: bash -c 'uv run ruff format . && uv run ruff check --fix .'
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        always_run: true
