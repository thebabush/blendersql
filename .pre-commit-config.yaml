exclude: '^reference/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: ruff
        name: ruff (format + check --fix)
        entry: bash -c 'uv run ruff format . && uv run ruff check --fix .'
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        always_run: true
      - id: regen-skills-check
        name: regen-skills (autogen blocks in sync)
        # Boots a headless Blender (~1.4s) to verify SKILL.md marker blocks
        # match the live introspection-vtable output. Restricted to paths that
        # could affect the catalog so tiny commits stay fast. Exits 2 if
        # Blender / fixture is unavailable — see scripts/regen_skills.py.
        entry: uv run python scripts/regen_skills.py --check
        language: system
        pass_filenames: false
        files: '^(blendersql/sql/vtables/|blendersql/sql/functions/|scripts/regen_skills\.py|skills/plugins/blendersql/skills/.*\.md$)'
