name: Release

on:
  push:
    tags: ['v*']

env:
  BLENDER_VERSION: '5.1.1'
  BLENDER_DIR: blender-5.1.1-linux-x64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Blender
        run: |
          url="https://download.blender.org/release/Blender5.1/${BLENDER_DIR}.tar.xz"
          curl -fsSL "$url" -o blender.tar.xz
          tar -xf blender.tar.xz
          echo "$PWD/${BLENDER_DIR}" >> "$GITHUB_PATH"

      - name: Fetch wheels
        run: python scripts/fetch_wheels.py

      - name: Build extension
        run: blender --command extension build --split-platforms --output-dir dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
