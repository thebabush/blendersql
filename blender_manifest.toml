schema_version = "1.0.0"

id = "blendersql"
version = "0.0.1"
name = "BlenderSQL"
tagline = "SQL interface to bpy.data for AI agents"
maintainer = "Paolo Montesel <paolo.montesel@gmail.com>"
type = "add-on"

blender_version_min = "5.1.0"

tags = ["Development", "Pipeline", "System"]
license = ["SPDX:MPL-2.0"]
copyright = ["2026 Paolo Montesel"]
platforms = ["macos-arm64", "macos-x64", "linux-x64", "linux-arm64", "windows-x64"]

# Vendored wheels — Blender installs the one matching the host platform.
# Regenerated by scripts/fetch_wheels.py; only the macosx_arm64 wheel is committed.
wheels = [
    "./wheels/apsw-3.53.1.0-cp313-cp313-macosx_10_13_x86_64.whl",
    "./wheels/apsw-3.53.1.0-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/apsw-3.53.1.0-cp313-cp313-manylinux_2_28_aarch64.whl",
    "./wheels/apsw-3.53.1.0-cp313-cp313-manylinux_2_28_x86_64.whl",
    "./wheels/apsw-3.53.1.0-cp313-cp313-win_amd64.whl",
]

[permissions]
network = "Hosts a localhost HTTP server for SQL queries"
files = "Reads and writes bpy.data when queried"

[build]
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "/.github/",
    "/.gitignore",
    "/.gitattributes",
    "/.venv/",
    "/tests/",
    "/cli/",
    "/reference/",
    "/scripts/",
    "/skills/",
    "/.vscode/",
    "/pyproject.toml",
    "/uv.lock",
    "/.python-version",
    "/DEVELOPMENT.md",
    "/Makefile",
    "/.rrr",
    "/.pytest_cache/",
    "/.ruff_cache/",
    "*.blend1",
    "*.blend@",
]
